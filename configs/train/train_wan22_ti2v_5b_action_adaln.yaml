# RoboTwin Wan2.2 TI2V action-adaln training profile.
# This file stores public, reproducible training parameters only.
# Keep machine-local paths in scripts/train_local.sh or CLI overrides.

dataset:
  dataset_name: "robotwin"
  dataset_base_path: ""
  dataset_metadata_path: null
  dataset_repeat: 1
  dataset_num_workers: 8
  data_keys: null

video:
  height: 480
  width: 640
  max_pixels: 16777216
  num_frames: 81
  resize_mode: "crop"
  num_history_frames: 9
  time_division_factor: 4
  time_division_remainder: 1
  spatial_division_factor: 32
  history_template_sampling: 1

model:
  model_paths: ""
  model_id_with_origin_paths: null
  extra_inputs: null
  fp8_models: null
  offload_models: null
  model_config_path: "configs/model/wan2_2_ti2v_5b.yaml"
  initialize_model_on_cpu: false
  weights: ["dit", "vae"]
  modes:
    dit: "default"
    text: "none"
    vae: "emb" # emb/raw
    image: "none"
    action: "adaln"

action:
  action_type: "eef_abs"
  action_stat_path: null
  action_dim: 14

training:
  learning_rate: 5e-5
  num_epochs: 1
  trainable: ["dit", "action_encoder"]
  find_unused_parameters: true
  weight_decay: 0.01
  task: "sft"
  seed: 42
  mixed_precision: "bf16"
  max_timestep_boundary: 1.0
  min_timestep_boundary: 0.0
  max_train_steps: 20000
  batch_size: 1

output:
  output_path: "outputs/training/train_wan22_ti2v_5b_action_adaln"
  remove_prefix_in_ckpt: "pipe.dit."
  save_steps: 2000
  ckpt_path: null
  resume_from: null

lora:
  lora_base_model: null
  lora_target_modules: ""
  lora_rank: 32
  lora_checkpoint: null
  preset_lora_path: null
  preset_lora_model: null

gradient:
  use_gradient_checkpointing: false
  use_gradient_checkpointing_offload: false
  gradient_accumulation_steps: 16
  max_grad_norm: 0.5

tracking:
  use_wandb: false
  use_swanlab: false
  run_name: null
